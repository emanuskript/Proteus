name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write  # needed to create GitHub Release

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archive: Proteus-linux.tar.gz
          - os: macos-latest
            archive: Proteus-macos.tar.gz
          - os: windows-latest
            archive: Proteus-windows.zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build (Linux / macOS)
        if: runner.os != 'Windows'
        run: bash packaging/build.sh --skip-tests

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: packaging\build.bat --skip-tests

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all archives
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            Proteus-linux.tar.gz
            Proteus-macos.tar.gz
            Proteus-windows.zip
